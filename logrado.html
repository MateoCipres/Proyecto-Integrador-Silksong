<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logrado</title>
    <link rel="shortcut icon" href="IMAGENES/logrado.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Enviame tus datos y cuentame tu experiencia</h1>
    </header>

    <main>

        <h2>Formulario</h2>
        <form id="form-experiencia" action="" novalidate>
            <fieldset>
                <legend>FORMULARIO DE REGISTRO</legend>
                <div class="par">
                    <label for="nombre">Ingresa tu nombre de usuario:</label>
                    <input type="text" id="nombre" placeholder="nombre">
                    <label for="correo">Ingresa tu correo:</label>
                    <input type="email" id="correo" placeholder="email">
                </div>
                <div class="par2">
                    <label for="rango">¿Qué puntaje le das?</label>
                    <input type="range" name="rango" min="0" max="100" step="1">
                </div>
                <div class="par3">
                    <label for="motivo">Cuentame tu experiencia platinando este juego:</label>
                    <textarea id="experiencia" rows="6" cols="25" maxlength="600" placeholder="Escriba aqui..."></textarea>
                </div>
                <p id="mensaje-error" class="oculto"></p>
                <p id="mensaje-exito" class="oculto">¡Gracias por compartir tu experiencia!</p>
                <input class="boton-enviar" type="submit" value="Enviar">

            </fieldset>
        </form>
        <a href="index.html"> Volver al inicio</a>
    </main>

    <footer>
        <a href="https://www.instagram.com/mateo_cipres/" target="_blank"> instagram personal</a><br> Creado por Mateo Cipres
    </footer>
    <script src="script.js"></script>
</body>

</html>

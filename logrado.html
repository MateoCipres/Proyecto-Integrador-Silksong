<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logrado</title>
    <link rel="shortcut icon" href="IMAGENES/logrado.png" type="image/x-icon">
</head>

<body>
    <header>
        <h1>Enviame tus datos y cuentame tu experiencia</h1>
    </header>

    <main>
        <h2>Formulario</h2>
        <form action="">
            <fieldset>
                <legend>FORMULARIO DE REGISTRO</legend>
                <label for="nombre">Ingresa tu nombre de usuario:</label><br>
                <input type="text" placeholder="nombre" required> <br><br>
                <label for="correo">Ingresa tu correo:</label><br>
                <input type="email" placeholder="email" required><br><br>
                <label for="rango">¿Qué puntaje le das?</label>
                <input type="range" name="rango" min="0" max="100" step="1"><br><br>
                <label for="motivo">Cuentame tu experiencia platinando este juego:</label> <br>
                <textarea rows="6" cols="25" maxlength="600" placeholder="Escriba aqui..."></textarea><br><br>
                <input type="submit" value="Enviar">

            </fieldset>
        </form>
        <a href="index.html"> Volver al inicio</a>
    </main>

    <footer>
        <a href="https://www.instagram.com/mateo_cipres/" target="_blank"> instagram personal</a><br> Creado por Mateo Cipres
    </footer>
</body>

</html>
